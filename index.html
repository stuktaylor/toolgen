<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Toolsgen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              ink: '#13243a',
              mist: '#eef4f6',
              ember: '#d97706',
              pine: '#174e4f',
              coral: '#f97360',
            },
            fontFamily: {
              sans: ['"Instrument Sans"', 'ui-sans-serif', 'system-ui'],
            },
            boxShadow: {
              panel: '0 24px 60px rgba(19, 36, 58, 0.12)',
            },
          },
        },
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="min-h-screen bg-mist text-ink">
    <div
      class="fixed inset-0 -z-10 bg-[radial-gradient(circle_at_top_left,_rgba(249,115,96,0.18),_transparent_32%),radial-gradient(circle_at_bottom_right,_rgba(23,78,79,0.2),_transparent_34%),linear-gradient(180deg,_#f8fbfc_0%,_#edf3f4_100%)]"
    ></div>
    <div id="root"></div>
    <noscript>
      <div class="mx-auto max-w-3xl p-8">
        <div class="rounded-3xl border border-white/70 bg-white/90 p-8 shadow-panel">
          <h1 class="text-2xl font-semibold">JavaScript is required</h1>
          <p class="mt-3 text-sm text-slate-600">
            Toolsgen needs JavaScript enabled to log in, generate tools, and render previews.
          </p>
        </div>
      </div>
    </noscript>
    <script type="module" src="/app.js"></script>
  </body>
</html>
